# Alembic / Flask-Migrate の基本設定。
# `flask db ...` 実行時に、このファイルと migrations/env.py が一緒に使われる。

[alembic]
# マイグレーションファイル一式を置く場所。
script_location = migrations
# プロジェクトルートを import パスに足し、`from app import ...` を読めるようにする。
prepend_sys_path = .

# DB URL はここに直書きせず、migrations/env.py から Flask 設定を注入する。
# これでローカル SQLite と本番 Postgres を同じ設定ファイルで扱える。

[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
