services:
  - type: web
    name: flask-todo-pro-pwa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "python -m flask --app wsgi.py db upgrade && gunicorn wsgi:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: flask-todo-db
          property: connectionString

databases:
  - name: flask-todo-db
    plan: free
    databaseName: flask_todo
    user: flask_todo
    ipAllowList: []
