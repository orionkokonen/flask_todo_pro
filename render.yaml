# render.yaml: Render Blueprint 用の公開設定。
# どの外部サービス・環境変数で動かすかをコードとして残している。
services:
  - type: web
    name: flask-todo-pro-pwa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # 起動時に migration を適用してからアプリを上げる。
    # db upgrade は未適用の差分のみ処理されるため、毎回呼んでも問題ない。
    startCommand: bash -lc "python -m flask --app wsgi.py db upgrade && gunicorn wsgi:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        # Render がデプロイ時にランダムな値を自動生成する。
        # 固定値を避けることで、予測しやすいセッション秘密鍵になるのを防ぐ。
        generateValue: true
      - key: PYTHONUNBUFFERED
        # 標準出力をバッファしない設定。ログがリアルタイムで Render ダッシュボードに表示される。
        value: "1"
      - key: PROXY_FIX_TRUSTED_HOPS
        # Render の前段にはリバースプロキシが 1 つある前提で、そのぶんだけ信頼する設定。
        # これがないとアプリが「利用者の IP」ではなく「手前のプロキシの IP」を見てしまい、
        # レート制限が全員まとめて同じ相手として数えられることがある。
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          # Render Blueprint では Web サービスと Postgres を同時に定義し、接続文字列を注入する。
          # アプリ側では DATABASE_URL が読めればよく、個別の接続情報をコードに埋め込まない。
          name: flask-todo-db
          property: connectionString

databases:
  - name: flask-todo-db
    plan: free
    databaseName: flask_todo
    user: flask_todo
    # ipAllowList を空にすると Render 内部ネットワークからのみ接続を受ける。
    # Web サービスと同一環境で運用するため、外部 IP 許可は不要。
    ipAllowList: []
