<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - ページが見つかりません | ToDo Pro</title>
  <!-- 単独の静かな画面にして、存在しない URL でも余計な情報を出さないようにする。 -->
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8f9fa; color: #333; }
    .error-box { text-align: center; padding: 2rem; }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    p { color: #666; }
    a { color: #214b6b; }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>404</h1>
    <!-- URL の打ち間違いでも、利用者が次の行動に迷わないようトップ導線を残す。 -->
    <p>お探しのページは見つかりませんでした。</p>
    <!-- 詳細な内部情報は出さず、「戻れる」ことだけをはっきり伝える。 -->
    <a href="/">トップへ戻る</a>
  </div>
</body>
</html>
