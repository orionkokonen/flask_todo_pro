<!-- このファイルは権限が足りないときに見せるエラーページです。 -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 - アクセス拒否 | ToDo Pro</title>
  <!-- ベーステンプレートを使わず単独ページにしているのは、
       エラー発生中でも最小構成で確実に表示したいため。 -->
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8f9fa; color: #333; }
    .error-box { text-align: center; padding: 2rem; }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    p { color: #666; }
    a { color: #214b6b; }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>403</h1>
    <!-- 403 は「ログイン不足」ではなく「権限が足りない」を伝える番号。 -->
    <p>このページへのアクセス権がありません。</p>
    <!-- 行き止まりにしないため、戻り先は常に 1 つ置いておく。 -->
    <a href="/">トップへ戻る</a>
  </div>
</body>
</html>
