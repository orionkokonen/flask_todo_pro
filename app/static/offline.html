<!-- このファイルはオフライン時に見せる画面のテンプレートです。 -->
<!-- offline.html — ネットワーク切断時に Service Worker が代わりに表示するページ。 -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d6efd" />
    <title>オフライン - Todo Pro</title>
    <!-- 通常画面と同じ CSS を読むと、オフライン専用ページだけ見た目が別物になるのを防げる。 -->
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="bg-body-tertiary">
    <!-- 通常画面と似たカード構成にしておくと、
         オフラインでも「別サイトへ飛ばされたような不安」を減らしやすい。 -->
    <div class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">オフラインです</h1>
          <p class="mb-3">
            ネットワークに接続できないため、この画面を表示しています。
            接続が戻ったら、ページを再読み込みしてください。
          </p>
          <!-- まず戻る先を 1 つだけ示し、「次に何を押せばよいか」を単純にしている。 -->
          <a class="btn btn-primary" href="/">トップへ</a>
        </div>
      </div>
    </div>
  </body>
</html>
