# このファイルは migrations フォルダ用の Alembic 設定を書くファイルです。
# Alembic の雛形設定ファイル。
# 実運用ではルートの alembic.ini と migrations/env.py が主に使われるが、
# 生成元の意図が分かるように残している。

[alembic]
# マイグレーションファイル名のテンプレート。既定値で足りるのでコメントアウトのまま。
# file_template = %%(rev)s_%%(slug)s

# `revision` 実行時にも env.py を必ず動かす設定。
# 今回は既定値で十分なので無効のままにしている。
# revision_environment = false


# ログ設定。マイグレーション時の出力を見やすくするためのもの。
[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
